<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLASH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ANA MENÜ EKRANI -->
    <div id="main-menu">
        <h1 id="rainbow-title">FLASH</h1>
        <p class="creator-tag">Geliştirici: Deniz Akpınar</p>
        <div class="menu-btn-group">
            <button onclick="startGameFromMenu()" class="menu-main-btn">OYUNA GİR</button>
            <button onclick="openShop()" class="menu-shop-btn">🛒 MAĞAZA / SKİN & İZ</button>
        </div>
    </div>

    <!-- MAĞAZA / KARAKTER ÖZELLEŞTİRME EKRANI -->
    <div id="shop-screen" style="display: none;">
        <h2>MAGAZA & ÖZELLEŞTİRME</h2>
        <p>Toplam Altın: <strong id="shop-gold">0</strong></p>
        
        <div class="shop-sections">
            <div class="shop-box">
                <h3>Skin Seçimi</h3>
                <div id="skin-list">
                    <button id="btn-skin-tekne" onclick="selectSkin('tekne')" class="shop-item-btn active-item">Tekne (Seçili)</button>
                    <button id="btn-skin-roket" onclick="buyOrSelectSkin('roket', 50)" class="shop-item-btn">🚀 Roket (50 Altın)</button>
                    <button id="btn-skin-araba" onclick="buyOrSelectSkin('araba', 80)" class="shop-item-btn">🏎️ Araba (80 Altın)</button>
                    <button id="btn-skin-denizalti" onclick="buyOrSelectSkin('denizalti', 120)" class="shop-item-btn">🛥️ Denizaltı (120 Altın)</button>
                    <button id="btn-skin-balina" onclick="buyOrSelectSkin('balina', 200)" class="shop-item-btn">🐋 Balina (200 Altın)</button>
                </div>
            </div>

            <div class="shop-box">
                <h3>Arka İz (Trail) Seçimi</h3>
                <div id="trail-list">
                    <button id="btn-trail-yok" onclick="selectTrail('yok')" class="shop-item-btn active-item">İz Yok (Seçili)</button>
                    <button id="btn-trail-mavi" onclick="buyOrSelectTrail('mavi', 20)" class="shop-item-btn">🔵 Mavi İz (20 Altın)</button>
                    <button id="btn-trail-kirmizi" onclick="buyOrSelectTrail('kirmizi', 30)" class="shop-item-btn">🔴 Kırmızı İz (30 Altın)</button>
                    <button id="btn-trail-yesil" onclick="buyOrSelectTrail('yesil', 40)" class="shop-item-btn">🟢 Yeşil İz (40 Altın)</button>
                    <button id="btn-trail-gokkusagi" onclick="buyOrSelectTrail('gokkusagi', 150)" class="shop-item-btn">🌈 Gökkuşağı İzi (150 Altın)</button>
                </div>
            </div>
        </div>
        <br>
        <button onclick="closeShop()" class="menu-main-btn">GERİ DÖN</button>
    </div>

    <!-- OYUN ALANI -->
    <div id="game-container" style="display: none;">
        
        <!-- Sol Üst Ana Menüye Dön Butonu & Üst Bilgi -->
        <div id="ui-panel">
            <button onclick="returnToMainMenu()" id="back-menu-btn">🏠 Ana Menü</button>
            <span>Altın: <strong id="cargo-val">0</strong></span>
            <span>Skor: <strong id="fuel-val">0</strong></span>
            <span>Durum: <strong id="status-val">Seyirde</strong></span>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="800" height="450"></canvas>
            
            <!-- Oyun Bitti Ekranı -->
            <div id="gameover-screen" style="display: none;">
                <h2>ÇARPTIN!</h2>
                <p>Skorun: <span id="final-score">0</span></p>
                <button onclick="respawn()" id="respawn-btn">15 Altına Yeniden Doğ</button>
                <br><br>
                <button onclick="resetGame()" id="restart-btn">Baştan Başla</button>
            </div>
        </div>

        <!-- Mobil Dokunmatik Butonlar -->
        <div id="mobile-controls">
            <button id="btn-up" 
                ontouchstart="movingUp=true; event.preventDefault();" 
                ontouchend="movingUp=false;" 
                onmousedown="movingUp=true;" 
                onmouseup="movingUp=false;">⬆️ YUKARI</button>
            <button id="btn-down" 
                ontouchstart="movingDown=true; event.preventDefault();" 
                ontouchend="movingDown=false;" 
                onmousedown="movingDown=true;" 
                onmouseup="movingDown=false;">⬇️ AŞAĞI</button>
        </div>

        <div id="controls-hint">
            Masaüstü: <strong>W, S</strong> | Mobil: Altındaki butonları kullan!
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
