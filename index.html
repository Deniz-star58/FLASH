<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLASH - Uzay Macerası</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ANA MENÜ EKRANI -->
    <div id="main-menu">
        <h1>FLASH</h1>
        <p>Geliştirici: Deniz Akpınar</p>
        
        <div class="menu-container">
            <button class="menu-btn" onclick="startGameFromMenu()">OYUNA GİR</button>
            <button class="menu-btn" onclick="openShop()">🛒 MAĞAZA / SKİN & İZ</button>
            <button class="fullscreen-btn" onclick="toggleFullScreen()">🖥️ Tam Ekran Oyna</button>
        </div>
    </div>

    <!-- OYUN ALANI VE ARAYÜZ -->
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Üst Bilgi Paneli -->
        <div id="ui-panel">
            <button onclick="returnToMainMenu()">🏠 Ana Menü</button>
            <div id="cargo-info">Altın: <span id="cargo-val">0</span></div>
            <div id="fuel-info">Skor: <span id="fuel-val">0</span></div>
            <div id="status-info">Durum: <span id="status-val">Sv. 1 (0/10)</span></div>
        </div>

        <!-- Mobil Kontroller (Sağ Tarafta Alt Alta Oklar) -->
        <div id="mobile-controls">
            <button class="control-btn" id="btn-up">▲</button>
            <button class="control-btn" id="btn-down">▼</button>
        </div>

        <!-- Oyun Bitti (Game Over) Ekranı -->
        <div id="gameover-screen">
            <h2>ÇARPTIN!</h2>
            <p>Skorun: <span id="final-score">0</span></p>
            <button class="gameover-btn" onclick="respawn()">15 Altına Yeniden Doğ</button>
            <button class="gameover-btn" onclick="resetGame()">Baştan Başla</button>
        </div>
    </div>

    <!-- MAĞAZA EKRANI (Başlangıçta gizli) -->
    <div id="shop-screen" style="display: none;">
        <h2>MAĞAZA</h2>
        <button class="menu-btn" onclick="closeShop()">Geri Dön</button>
    </div>

    <script src="game.js"></script>
    
    <!-- Maç ve Mobil Tuş Kontrolleri -->
    <script>
        // Mağaza Fonksiyonları
        function openShop() {
            document.getElementById("main-menu").style.display = "none";
            document.getElementById("shop-screen").style.display = "flex";
        }

        function closeShop() {
            document.getElementById("shop-screen").style.display = "none";
            document.getElementById("main-menu").style.display = "flex";
        }

        // Mobil Dokunmatik Tuşlar
        const btnUp = document.getElementById("btn-up");
        const btnDown = document.getElementById("btn-down");

        if(btnUp && btnDown) {
            btnUp.addEventListener("touchstart", (e) => { e.preventDefault(); movingUp = true; });
            btnUp.addEventListener("touchend", (e) => { e.preventDefault(); movingUp = false; });
            btnUp.addEventListener("mousedown", () => { movingUp = true; });
            btnUp.addEventListener("mouseup", () => { movingUp = false; });

            btnDown.addEventListener("touchstart", (e) => { e.preventDefault(); movingDown = true; });
            btnDown.addEventListener("touchend", (e) => { e.preventDefault(); movingDown = false; });
            btnDown.addEventListener("mousedown", () => { movingDown = true; });
            btnDown.addEventListener("mouseup", () => { movingDown = false; });
        }
    </script>
</body>
</html>
