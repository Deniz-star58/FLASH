<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLASH - Uzay Macerası</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ANA MENÜ EKRANI -->
    <div id="main-menu">
        <h1>FLASH</h1>
        <p>Geliştirici: Deniz Akpınar</p>
        
        <div class="menu-container">
            <button class="menu-btn" onclick="startGameFromMenu()">OYUNA GİR</button>
            <button class="menu-btn" onclick="openShop()">🛒 MAĞAZA / SKİN & İZ</button>
            <button class="fullscreen-btn" onclick="toggleFullScreen()">🖥️ Tam Ekran Oyna</button>
        </div>
    </div>

    <!-- OYUN ALANI VE ARAYÜZ -->
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Üst Bilgi Paneli -->
        <div id="ui-panel">
            <button onclick="returnToMainMenu()">🏠 Ana Menü</button>
            <div id="cargo-info">Altın: <span id="cargo-val">0</span></div>
            <div id="fuel-info">Skor: <span id="fuel-val">0</span></div>
            <div id="status-info">Durum: <span id="status-val">Sv. 1 (0/10)</span></div>
        </div>

        <!-- Mobil Kontroller -->
        <div id="mobile-controls">
            <button class="control-btn" id="btn-up">▲</button>
            <button class="control-btn" id="btn-down">▼</button>
        </div>

        <!-- Oyun Bitti Ekranı -->
        <div id="gameover-screen">
            <h2>ÇARPTIN!</h2>
            <p>Skorun: <span id="final-score">0</span></p>
            <button class="gameover-btn" onclick="respawn()">15 Altına Yeniden Doğ</button>
            <button class="gameover-btn" onclick="resetGame()">Baştan Başla</button>
            <button class="gameover-btn" onclick="returnToMainMenu()">🏠 Ana Menüye Dön</button>
        </div>
    </div>

    <!-- MAĞAZA EKRANI -->
    <div id="shop-screen" style="display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a2a40 0%, #0b0f19 100%); z-index: 100;">
        <h2 style="color: #00bcd4; margin-bottom: 15px; font-size: 28px;">MAĞAZA - SKİN & İZ</h2>
        <p style="color: #ffeb3b; margin-bottom: 20px; font-weight: bold; font-size: 18px;">Altın: <span id="shop-money">0</span></p>
        
        <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 800px; margin-bottom: 20px;">
            <!-- Skin Seçimleri -->
            <div style="background: rgba(15, 23, 42, 0.9); border: 2px solid #00bcd4; padding: 15px; border-radius: 14px; text-align: center; width: 220px;">
                <h3 style="color: white; margin-bottom: 10px;">Araç Skinleri</h3>
                <button class="menu-btn" id="btn-skin-tekne" style="width: 100%; margin: 5px 0; font-size: 14px; padding: 10px;" onclick="selectSkin('tekne')">Tekne</button>
                <button class="menu-btn" id="btn-skin-roket" style="width: 100%; margin: 5px 0; font-size: 14px; padding: 10px;" onclick="selectSkin('roket')">Roket (50 Altın)</button>
                <button class="menu-btn" id="btn-skin-araba" style="width: 100%; margin: 5px 0; font-size: 14px; padding: 10px;" onclick="selectSkin('araba')">Araba (100 Altın)</button>
                <button class="menu-btn" id="btn-skin-denizalti" style="width: 100%; margin: 5px 0; font-size: 14px; padding: 10px;" onclick="selectSkin('denizalti')">Denizaltı (150 Altın)</button>
                <button class="menu-btn" id="btn-skin-balina" style="width: 100%; margin: 5px 0; font-size: 14px; padding: 10px;" onclick="selectSkin('balina')">Balina (200 Altın)</button>
            </div>

            <!-- İz Efektleri -->
            <div style="background: rgba(15, 23, 42, 0.9); border: 2px solid #00bcd4; padding: 15px; border-radius: 14px; text-align: center; width: 220px;">
                <h3 style="color: white; margin-bottom: 10px;">İz Efektleri</h3>
                <button class="menu-btn" id="btn-trail-yok" style="width: 100%; margin: 5px 0; font-size: 14px; padding: 10px;" onclick="selectTrail('yok')">İz Yok</button>
                <button class="menu-btn" id="btn-trail-mavi" style="width: 100%; margin: 5px 0; font-size: 14px; padding: 10px;" onclick="selectTrail('mavi')">Mavi İz (30 Altın)</button>
                <button class="menu-btn" id="btn-trail-kirmizi" style="width: 100%; margin: 5px 0; font-size: 14px; padding: 10px;" onclick="selectTrail('kirmizi')">Kırmızı İz (60 Altın)</button>
                <button class="menu-btn" id="btn-trail-yesil" style="width: 100%; margin: 5px 0; font-size: 14px; padding: 10px;" onclick="selectTrail('yesil')">Yeşil İz (90 Altın)</button>
                <button class="menu-btn" id="btn-trail-gokkusagi" style="width: 100%; margin: 5px 0; font-size: 14px; padding: 10px;" onclick="selectTrail('gokkusagi')">Gökkuşağı (150 Altın)</button>
            </div>
        </div>

        <button class="menu-btn" onclick="closeShop()">Ana Menüye Dön</button>
    </div>

    <script src="game.js"></script>
    
    <script>
        const btnUp = document.getElementById("btn-up");
        const btnDown = document.getElementById("btn-down");

        if (btnUp && btnDown) {
            btnUp.addEventListener("touchstart", (e) => { e.preventDefault(); movingUp = true; }, { passive: false });
            btnUp.addEventListener("touchend", (e) => { e.preventDefault(); movingUp = false; }, { passive: false });
            btnUp.addEventListener("touchcancel", (e) => { e.preventDefault(); movingUp = false; }, { passive: false });
            btnUp.addEventListener("mousedown", () => { movingUp = true; });
            btnUp.addEventListener("mouseup", () => { movingUp = false; });
            btnUp.addEventListener("mouseleave", () => { movingUp = false; });

            btnDown.addEventListener("touchstart", (e) => { e.preventDefault(); movingDown = true; }, { passive: false });
            btnDown.addEventListener("touchend", (e) => { e.preventDefault(); movingDown = false; }, { passive: false });
            btnDown.addEventListener("touchcancel", (e) => { e.preventDefault(); movingDown = false; }, { passive: false });
            btnDown.addEventListener("mousedown", () => { movingDown = true; });
            btnDown.addEventListener("mouseup", () => { movingDown = false; });
            btnDown.addEventListener("mouseleave", () => { movingDown = false; });
        }
    </script>
</body>
</html>
